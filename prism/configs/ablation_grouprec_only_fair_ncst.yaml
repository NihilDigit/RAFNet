training:
    seeds:
        - 43
    num_epochs: 100
    batch_size: 128
    grad_clip: 1.0
    label_names:
        - Bowing Head
        - Listening
        - Reading/Writing
        - "Null"
        - Using Phone
    output_dir: results/training/grouprec_only_fair_ncst

optimizer:
    name: adamw
    params:
        lr: 0.001
        weight_decay: 0.001

loss:
    name: focal
    params:
        num_classes: 5
        gamma: 1.5
        label_smoothing: 0.1

class_weights:
    method: log_balanced
    null_weight_factor: 0.1

scheduler:
    name: reduce_on_plateau
    params:
        mode: max
        factor: 0.5
        patience: 10

model:
    name: multimodal_classifier
    params:
        num_classes: 5
        hidden_dim: 256
        dropout: 0.3
        modalities: &id001
            - grouprec
        input_dims:
            - 1024

datasets:
    train:
        name: multimodal_features
        params:
            features_path: output/prism_features_ncst_grouprec/latest/train_features.pkl
            modalities: *id001
    val:
        name: multimodal_features
        params:
            features_path: output/prism_features_ncst_grouprec/latest/val_features.pkl
            modalities: *id001
    test:
        name: multimodal_features
        params:
            features_path: output/prism_features_ncst_grouprec/latest/test_features.pkl
            modalities: *id001

